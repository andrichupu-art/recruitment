<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#1c4062" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Buat Password Baru - PT. Juara</title>

  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Reuse style.css yang sama dengan index.html supaya tampilan (warna,
       font, kartu auth, tombol) konsisten persis — halaman ini memang
       sengaja dibuat terpisah dari index.html (bukan bagian dari SPA),
       tapi tetap satu identitas visual dengan app utama. -->
  <link rel="stylesheet" href="style.css?v=20" />

  <style>
    /* Halaman ini cuma berisi satu kartu auth di tengah layar (tidak perlu
       splash/dashboard/sidebar dsb dari index.html), jadi auth-wrapper
       dipaksa selalu terlihat & memenuhi layar. */
    html, body { background: #1c4062; margin: 0; min-height: 100vh; }
    .auth-wrapper { display: flex; }
  </style>
</head>
<body>

  <!-- TOAST NOTIFICATION (versi ringan, cuma dipakai di halaman ini) -->
  <div id="toast-container" class="toast-container"></div>

  <!-- AUTH PAGE: satu-satunya "page" di file ini -->
  <div id="auth-wrapper" class="auth-wrapper">
    <div id="page-set-password" class="auth-page active">
      <div class="auth-card glass">
        <div class="auth-logo">
          <div class="logo-icon brand-logo">
            <img src="LOGO_JD.svg" alt="PT. Juara" />
          </div>
          <h1>Buat Password Baru</h1>
          <p class="tagline">Satu langkah terakhir sebelum masuk ke akun Anda. Password ini dipakai untuk login di aplikasi ini (selain lewat Google).</p>
        </div>

        <form id="form-set-password" class="auth-form" novalidate>
          <div class="input-group">
            <label>Password Baru</label>
            <div class="input-with-icon">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="sp-password" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password" />
              <button type="button" class="toggle-password" data-target="sp-password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="sp-password-error"></span>
            <div class="password-strength">
              <div class="strength-bar"><div class="strength-fill"></div></div>
              <span class="strength-text"></span>
            </div>
          </div>

          <div class="input-group">
            <label>Konfirmasi Password Baru</label>
            <div class="input-with-icon">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="sp-password-confirm" placeholder="Ulangi password baru" required minlength="6" autocomplete="new-password" />
            </div>
            <span class="field-error" id="sp-password-confirm-error"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <span class="btn-text">Simpan &amp; Masuk</span>
            <span class="btn-loader hidden"></span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="set-password.js" defer></script>
</body>
</html>
